# Cube semantic layer for ballistar_vn on Trino
#
# Single-node setup: Cube API (REST + GraphQL + Playground + SQL API) with embedded
# Cube Store for pre-aggregations. Suitable for local dev / POC. For production,
# split out Cube Store router + worker(s) and run multiple Cube API replicas.
#
# Usage:
#   1. cp .env.example .env  &&  fill in your Trino credentials
#   2. docker compose up -d
#   3. Open http://localhost:4000 (Playground)
#   4. Or query via:
#        - REST:    POST http://localhost:4000/cubejs-api/v1/load
#        - GraphQL: POST http://localhost:4000/cubejs-api/graphql
#        - SQL:     psql -h localhost -p 15432 -U cube -d cube
#
services:
  cube_api:
    image: cubejs/cube:latest
    platform: linux/amd64
    container_name: ballistar_cube_api
    ports:
      - "4000:4000"     # REST / GraphQL / Playground
      - "15432:15432"   # SQL API (Postgres wire protocol)
    env_file:
      - .env
    # Patch the Trino driver at startup to strip `SET SESSION
    # query_max_run_time` (Trino role lacks SET_SYSTEM_SESSION_PROPERTY).
    # See cube-entrypoint-patched.sh for rationale and the long-term fix.
    # NOTE: Setting `entrypoint:` in Compose clears the image's default CMD,
    # so we must re-declare `command:` (image default is `cubejs server`),
    # otherwise docker-entrypoint.sh runs with no args and exits 0 silently.
    entrypoint: ["/usr/local/bin/cube-entrypoint-patched.sh"]
    command: ["cubejs", "server"]
    volumes:
      # Mount the whole cube/ tree at /cube/conf so Cube auto-loads cube.js,
      # auth-db.js, auth-users.json, and model/ in one shot. Read-only so the
      # container can't mutate auth state.
      - ./cube:/cube/conf:ro
      - ./cube-entrypoint-patched.sh:/usr/local/bin/cube-entrypoint-patched.sh:ro
    depends_on:
      - cubestore
    restart: unless-stopped

  cubestore:
    # `cubejs/cubestore:latest` is NOT a multi-arch manifest — Cube ships
    # separate tags per arch. Pick the matching one in your local .env:
    #   Apple Silicon (M-series):   CUBESTORE_TAG=v1.6.46-arm64v8
    #   x86-64 (Win / Linux / Intel Mac): leave unset — defaults to v1.6.46
    # Running the amd64 tag on arm64 under Colima/Docker-Desktop emulation
    # wedges the Rust binary silently (no logs, no listening ports).
    image: cubejs/cubestore:${CUBESTORE_TAG:-v1.6.46}
    container_name: ballistar_cubestore
    environment:
      CUBESTORE_DATA_DIR: /cube/data
    volumes:
      - cubestore_data:/cube/data
    restart: unless-stopped

volumes:
  cubestore_data:
