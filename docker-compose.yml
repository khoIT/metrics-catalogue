# Cube semantic layer for ballistar_vn on Trino
#
# Single-node setup: Cube API (REST + GraphQL + Playground + SQL API) with embedded
# Cube Store for pre-aggregations. Suitable for local dev / POC. For production,
# split out Cube Store router + worker(s) and run multiple Cube API replicas.
#
# Usage:
#   1. cp .env.example .env  &&  fill in your Trino credentials
#   2. docker compose up -d
#   3. Open http://localhost:4000 (Playground)
#   4. Or query via:
#        - REST:    POST http://localhost:4000/cubejs-api/v1/load
#        - GraphQL: POST http://localhost:4000/cubejs-api/graphql
#        - SQL:     psql -h localhost -p 15432 -U cube -d cube
#
services:
  cube_api:
    image: cubejs/cube:latest
    platform: linux/amd64
    container_name: ballistar_cube_api
    ports:
      - "4000:4000"     # REST / GraphQL / Playground
      - "15432:15432"   # SQL API (Postgres wire protocol)
    env_file:
      - .env
    volumes:
      - ./cube/model:/cube/conf/model:ro
    depends_on:
      - cubestore
    restart: unless-stopped

  cubestore:
    image: cubejs/cubestore:arm64v8
    container_name: ballistar_cubestore
    environment:
      CUBESTORE_DATA_DIR: /cube/data
      CUBESTORE_SERVER_NAME: cubestore:9999
      CUBESTORE_META_PORT: 9999
    volumes:
      - cubestore_data:/cube/data
    restart: unless-stopped

volumes:
  cubestore_data:
