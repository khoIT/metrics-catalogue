cubes:
  # ===========================================================================
  # recharge — raw recharge transactions for CFM VN.
  # Source: <CUBEJS_DB_SCHEMA>.etl_ingame_recharge
  #
  # CFM uses the VNG SDK raw recharge schema, which is structurally different
  # from ballistar's "etl-curated" shape. Field mapping:
  #   vopenid                 -> account_id (canonical user identifier)
  #   vng_transaction         -> transaction_id (primary VNG payment id)
  #   iamount                 -> charged_value (in user currency; usually VND)
  #   imoney_us               -> usd value
  #   imoney                  -> ingame currency received
  #   event_time_with_timezone-> recharge_time
  #   payment_channel         -> payment_channel
  #   zoneid                  -> server_id
  #   currency                -> money_type / currency code
  #   productid               -> product_id
  #
  # Columns absent in CFM raw vs ballistar canonical (intentionally not modeled):
  #   country_code, os_platform, is_first_recharge, role_id, role_name, role_class,
  #   role_level, vip_level, money_type (use currency instead)
  # ===========================================================================
  - name: recharge
    sql_table: etl_ingame_recharge
    title: CFM VN — Recharge Transactions (raw events)
    description: >
      One row per recharge transaction in CFM VN. User join key is vopenid
      (= mf_users.user_id). For best 1-user latency, ALWAYS pass a
      vopenid (or user_id via the joined view) equality filter.

    joins:
      - name: mf_users
        relationship: many_to_one
        sql: "{CUBE}.vopenid = {mf_users}.user_id"

    refresh_key:
      every: 5 minute

    dimensions:
      - name: transaction_id
        sql: vng_transaction
        type: string
        primary_key: true
        description: Canonical VNG payment transaction id

      - name: fsequence_no
        sql: fsequence_no
        type: string
        description: VNG SDK sequence number (alternative txn key)

      - name: user_id
        sql: vopenid
        type: string
        description: User account id (= mf_users.user_id)

      - name: vopenid
        sql: vopenid
        type: string
        public: false

      - name: fuin
        sql: fuin
        type: string
        description: Numeric VNG UID
        public: false

      - name: recharge_time
        sql: event_time_with_timezone
        type: time

      - name: recharge_date
        sql: "from_iso8601_timestamp(CAST({CUBE}.log_date AS VARCHAR) || 'T00:00:00Z')"
        type: time

      - name: log_month
        sql: log_month
        type: string

      - name: payment_channel
        sql: payment_channel
        type: string

      - name: pay_channel_raw
        sql: pay_channel
        type: string
        description: Raw SDK pay_channel (use payment_channel for canonical reporting)

      - name: login_channel
        sql: login_channel
        type: string

      - name: sub_channel_id
        sql: sub_channel_id
        type: string

      - name: currency
        sql: currency
        type: string
        description: Currency code of charged_value (VND for VN users, may differ)

      - name: product_id
        sql: productid
        type: string

      - name: offer_id
        sql: fofferid
        type: string
        description: VNG offer id (catalog of paid products)

      - name: server_id
        sql: zoneid
        type: string

      - name: zoneid2
        sql: zoneid2
        type: string
        public: false

      - name: platid
        sql: platid
        type: string
        description: VNG platform id

      - name: user_type
        sql: user_type
        type: string

      - name: user_ip
        sql: user_ip
        type: string
        public: false

      - name: value_vnd
        sql: iamount
        type: number
        description: Charged value (iamount). Currency = `currency` dimension; VND for VN.

      - name: value_source
        sql: imoney_source
        type: number
        description: Charged value in original source currency

      - name: value_usd
        sql: imoney_us
        type: number

      - name: ingame_value
        sql: imoney
        type: number
        description: In-game currency received

      - name: txn_value_band_vnd
        type: string
        case:
          when:
            - sql: "{CUBE}.iamount >= 1000000"
              label: ">= 1M"
            - sql: "{CUBE}.iamount >= 200000"
              label: "200K - 1M"
            - sql: "{CUBE}.iamount >= 50000"
              label: "50K - 200K"
            - sql: "{CUBE}.iamount >= 10000"
              label: "10K - 50K"
          else:
            label: "< 10K"

    measures:
      - name: transactions
        type: count

      - name: revenue_vnd
        sql: iamount
        type: sum
        description: Sum of iamount. Filter currency='VND' for strict VND revenue.

      - name: revenue_usd
        sql: imoney_us
        type: sum

      - name: paying_users
        type: count_distinct_approx
        sql: vopenid

      - name: paying_users_exact
        type: count_distinct
        sql: vopenid

      - name: arppu_vnd
        sql: "{revenue_vnd} * 1.0 / NULLIF({paying_users}, 0)"
        type: number

      - name: arpt_vnd
        sql: "{revenue_vnd} * 1.0 / NULLIF({transactions}, 0)"
        type: number
        description: Average revenue per transaction

    segments:
      - name: vnd_only
        sql: "{CUBE}.currency = 'VND'"
        description: Restrict to VND-charged transactions (drops foreign-currency edge cases)

      - name: last_7d
        sql: "{CUBE}.event_time_with_timezone >= CURRENT_TIMESTAMP - INTERVAL '7' DAY"

      - name: last_30d
        sql: "{CUBE}.event_time_with_timezone >= CURRENT_TIMESTAMP - INTERVAL '30' DAY"
