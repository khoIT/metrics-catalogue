# Ordered event funnel — UNION of per-event ETL tables.
#
# Detection contract (frontend auto-detects):
#   cube exposes step_count measure + step_index dim + step_name filter-only dim.
#   See docs/ordered-funnel-cube-template.md.
#
# Per-game customisation: ballistar uses `account_id` as user identifier, and
# table-specific timestamp columns (login_time / logout_time / recharge_time /
# create_time). One UNION ALL branch per available etl_ingame_* event source.

cubes:
  - name: ordered_event_funnel
    # Link funnel rows to the user master profile so step measures can be
    # sliced by user attributes (country, os_platform, install cohort).
    # many_to_one: every funnel row belongs to exactly one user, so grouping
    # by mf_users dimensions is a safe lookup with no row fan-out.
    joins:
      - name: mf_users
        relationship: many_to_one
        sql: "{CUBE}.user_id = {mf_users}.user_id"
    sql: |
      WITH events AS (
        SELECT account_id AS user_id, 'login'    AS event_name, login_time   AS ts FROM etl_ingame_login
        UNION ALL
        SELECT account_id,            'logout',                  logout_time         FROM etl_ingame_logout
        UNION ALL
        SELECT account_id,            'recharge',                recharge_time       FROM etl_ingame_recharge
        UNION ALL
        SELECT account_id,            'register',                create_time         FROM etl_ingame_register
      ),
      filtered AS (
        SELECT user_id, event_name, ts
        FROM events
        WHERE {FILTER_PARAMS.ordered_event_funnel.step_name.filter('event_name')}
      )
      SELECT
        user_id,
        event_name,
        CAST(ROW_NUMBER() OVER (PARTITION BY user_id ORDER BY ts) AS BIGINT) AS step_index
      FROM filtered

    refresh_key:
      every: 30 minute

    dimensions:
      - name: step_index
        sql: step_index
        type: number

      - name: step_name
        sql: event_name
        type: string

    measures:
      - name: step_count
        type: count_distinct
        sql: user_id
