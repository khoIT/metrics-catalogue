# Retention cube — Day-N retention from std_ingame_user_active_daily.
#
# Detection contract (frontend auto-detects):
#   cube name matches /retention/i AND exposes cohort_size, retained_d1/3/7/14/30,
#   and install_date time dim. See docs/cohort-retention-cube-template.md.
#
# Definition:
#   cohort      = users by first day they appear in std_ingame_user_active_daily
#   retained DN = same user has another active row exactly N days after install
#
# Identical SQL across ballistar/cfm/jus/pubg (std_ingame_user_active_daily
# is schema-stable). Cube's per-tenant routing picks the right Trino schema.

cubes:
  - name: retention
    sql: |
      WITH first_seen AS (
        SELECT
          user_id,
          MIN(log_date) AS install_date
        FROM std_ingame_user_active_daily
        WHERE {FILTER_PARAMS.retention.install_date.filter('log_date')}
        GROUP BY user_id
      ),
      activity AS (
        SELECT DISTINCT user_id, log_date AS active_date
        FROM std_ingame_user_active_daily
      )
      SELECT
        fs.install_date,
        COUNT(DISTINCT fs.user_id) AS cohort_size,
        COUNT(DISTINCT CASE WHEN a.active_date = fs.install_date + INTERVAL '1'  DAY THEN fs.user_id END) AS retained_d1,
        COUNT(DISTINCT CASE WHEN a.active_date = fs.install_date + INTERVAL '3'  DAY THEN fs.user_id END) AS retained_d3,
        COUNT(DISTINCT CASE WHEN a.active_date = fs.install_date + INTERVAL '7'  DAY THEN fs.user_id END) AS retained_d7,
        COUNT(DISTINCT CASE WHEN a.active_date = fs.install_date + INTERVAL '14' DAY THEN fs.user_id END) AS retained_d14,
        COUNT(DISTINCT CASE WHEN a.active_date = fs.install_date + INTERVAL '30' DAY THEN fs.user_id END) AS retained_d30
      FROM first_seen fs
      LEFT JOIN activity a ON a.user_id = fs.user_id
      GROUP BY fs.install_date

    refresh_key:
      every: 1 hour

    dimensions:
      - name: install_date
        sql: install_date
        type: time

    measures:
      - name: cohort_size
        sql: cohort_size
        type: sum

      - name: retained_d1
        sql: retained_d1
        type: sum

      - name: retained_d3
        sql: retained_d3
        type: sum

      - name: retained_d7
        sql: retained_d7
        type: sum

      - name: retained_d14
        sql: retained_d14
        type: sum

      - name: retained_d30
        sql: retained_d30
        type: sum
